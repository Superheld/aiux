provider = "anthropic"
model = "claude-sonnet-4-5-20250929"
temperature = 0.7
# api_key_env = "ANTHROPIC_API_KEY"  # Default, muss nicht angegeben werden
# context_window = 200000  # Override, z.B. fuer Ollama-Modelle
# compact_threshold = 80  # Kompaktifizierung bei X% Context-Window (0 = aus)

# --- MQTT (Nervensystem) ---
# mqtt_host = "localhost"  # Aktiviert MQTT-Bridge (ohne = deaktiviert)
# mqtt_port = 1883         # Default: 1883
