# Alpine Linux Konfiguration für AIUX
# Diese Datei definiert die Basis des Image-Builds.

ALPINE_VERSION="3.23.3"
ALPINE_ARCH="aarch64"
ALPINE_TARBALL="alpine-rpi-3.23.3-aarch64.tar.gz"
ALPINE_URL="https://dl-cdn.alpinelinux.org/alpine/v3.23/releases/aarch64/${ALPINE_TARBALL}"
ALPINE_SHA256=""  # TODO: SHA256 Checksum eintragen

# Partitionierung
BOOT_SIZE_MB=512
BOOT_LABEL="ALPINEPI"
DATA_LABEL="AIUXDATA"
DATA_FS="ext4"

# Target
TARGET_HOSTNAME="aiux"
TARGET_TIMEZONE="Europe/Berlin"
TARGET_KEYMAP="de"
