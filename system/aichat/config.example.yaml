# aichat Konfiguration fuer AIUX
# Kopieren nach ~/.config/aichat/config.yaml
# API-Key eintragen!

model: claude:claude-sonnet-4-5-20250929
clients:
  - type: claude
    api_key: YOUR_ANTHROPIC_API_KEY

save: true
highlight: true

# Soul als Default-Role: aichat startet immer als AIUX
repl_prelude: role:aiux
cmd_prelude: role:aiux

